name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            tauri-args: "--bundles nsis"
            artifact-name: windows-setup
            artifact-path: |
              src-tauri/target/release/bundle/nsis/*.exe
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            tauri-args: "--bundles deb"
            artifact-name: linux-deb
            artifact-path: |
              src-tauri/target/release/bundle/deb/*.deb
          - os: macos-latest
            target: aarch64-apple-darwin
            tauri-args: "--bundles dmg --target aarch64-apple-darwin"
            artifact-name: macos-dmg-arm64
            artifact-path: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - os: macos-13
            target: x86_64-apple-darwin
            tauri-args: "--bundles dmg --target x86_64-apple-darwin"
            artifact-name: macos-dmg-x64
            artifact-path: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Build Tauri app
        run: tauri build ${{ matrix.tauri-args }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/windows-setup/*
            artifacts/linux-deb/*
            artifacts/macos-dmg-arm64/*
            artifacts/macos-dmg-x64/*
